[package]
name = "hrdr"
description = "hrdr — herder: a fast, agentic coding harness for OpenAI-compatible models."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[package.metadata.deb]
maintainer = "mxaddict <mxaddict@kryptic.sh>"
copyright = "2026, mxaddict <mxaddict@kryptic.sh>"
extended-description = "herder: a fast, agentic coding harness for OpenAI-compatible models — a terminal coding agent with tools (read/write/edit/bash/grep/glob/todo), sessions, and a local-backend spawner."
section = "utils"
priority = "optional"
assets = [
  ["target/release/hrdr", "usr/bin/", "755"],
  ["../../README.md", "usr/share/doc/hrdr/README.md", "644"],
  ["../../LICENSE", "usr/share/doc/hrdr/LICENSE", "644"],
  # Generated by CI (host `hrdr --completions/--man`) before cargo-deb runs.
  ["../../pkgext/completions/hrdr.bash", "usr/share/bash-completion/completions/hrdr", "644"],
  ["../../pkgext/completions/hrdr.zsh", "usr/share/zsh/vendor-completions/_hrdr", "644"],
  ["../../pkgext/completions/hrdr.fish", "usr/share/fish/vendor_completions.d/hrdr.fish", "644"],
  ["../../pkgext/hrdr.1", "usr/share/man/man1/hrdr.1", "644"],
]

[package.metadata.generate-rpm]
assets = [
  { source = "target/release/hrdr", dest = "/usr/bin/hrdr", mode = "755" },
  { source = "README.md", dest = "/usr/share/doc/hrdr/README.md", mode = "644", doc = true },
  { source = "LICENSE", dest = "/usr/share/licenses/hrdr/LICENSE", mode = "644", doc = true },
  # Generated by CI (host `hrdr --completions/--man`) before generate-rpm runs.
  { source = "pkgext/completions/hrdr.bash", dest = "/usr/share/bash-completion/completions/hrdr", mode = "644" },
  { source = "pkgext/completions/hrdr.zsh", dest = "/usr/share/zsh/site-functions/_hrdr", mode = "644" },
  { source = "pkgext/completions/hrdr.fish", dest = "/usr/share/fish/vendor_completions.d/hrdr.fish", mode = "644" },
  { source = "pkgext/hrdr.1", dest = "/usr/share/man/man1/hrdr.1", mode = "644", doc = true },
]

[[bin]]
name = "hrdr"
path = "src/main.rs"

[dependencies]
hrdr-agent.workspace = true
hrdr-app.workspace = true
hrdr-llm.workspace = true
hrdr-tools.workspace = true
hrdr-tui.workspace = true
anyhow.workspace = true
tokio.workspace = true
serde_json.workspace = true
clap.workspace = true
clap_complete = "4"
clap_complete_nushell = "4"
clap_mangen = "0.3"
tracing-subscriber.workspace = true
which = "7"
