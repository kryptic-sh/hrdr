# hrdr default theme — compiled into the binary as the fallback.
# Tokyo Night colour palette, originally by folke (https://github.com/folke/tokyonight.nvim).
# Licensed under Apache-2.0.

[palette]
bg       = "#1a1b26"
fg       = "#c0caf5"
comment  = "#565f89"
red      = "#f7768e"
orange   = "#ff9e64"
yellow   = "#e0af68"
green    = "#9ece6a"
teal     = "#7dcfff"
blue     = "#7aa2f7"
mauve    = "#bb9af7"

# hrdr-specific background entries (overridable via user theme).
bg_user  = "#24283b"
bg_tool  = "#1f2335"

[ui]
background = "$bg"
foreground = "$fg"
cursor     = "$blue"
cursorline = "#292e42"
gutter     = "$comment"
diagnostic_error = "$red"

[ui.selection]
bg = "#3b4261"
