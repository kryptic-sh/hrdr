# hrdr default theme — compiled into the binary as the fallback.
# Tokyo Night (the "night" variant), originally by folke
# (https://github.com/folke/tokyonight.nvim). Licensed under Apache-2.0.
#
# The names and values below are upstream's, verbatim, so they can be checked
# against `extras/lua/tokyonight_night.lua`. hrdr's chat roles are mapped onto
# them by `hrdr_app::ChatPalette`.

[palette]
# Surfaces, darkest first.
bg_dark      = "#16161e"
bg_dark1     = "#1f2335"
bg           = "#1a1b26"
bg_highlight = "#292e42"
bg_visual    = "#283457"
# Sibling variants' surfaces, used for the extra block backgrounds below.
bg_moon      = "#222436"
bg_moon_dark = "#1e2030"
bg_storm     = "#24283b"

# Text.
fg        = "#c0caf5"
fg_dark   = "#a9b1d6"
fg_gutter = "#3b4261"
comment   = "#565f89"

# Accents.
blue    = "#7aa2f7"
cyan    = "#7dcfff"
magenta = "#bb9af7"
purple  = "#9d7cd8"
orange  = "#ff9e64"
yellow  = "#e0af68"
green   = "#9ece6a"
teal    = "#1abc9c"
red     = "#f7768e"
red1    = "#db4b4b"

# Transcript block backgrounds. The model's output and thinking use the
# terminal's own background (no override), and fenced code inherits whatever
# block it sits in; the rest get a surface so a reader can see where each block
# starts and stops. Each is a palette value above; a user theme may override any
# of them.
# (`[palette]` values must be literal hex — only `[ui]` resolves `$refs`.)
bg_user      = "#1e2030"  # bg_dark (moon) — also the tool-call block's background
bg_command   = "#24283b"  # bg_storm
bg_stats     = "#222436"  # bg_moon
bg_header    = "#292e42"  # bg_highlight

[ui]
background = "$bg"
foreground = "$fg"
cursor     = "$blue"
cursorline = "$bg_highlight"
gutter     = "$comment"
diagnostic_error = "$red"

[ui.selection]
bg = "$bg_visual"
